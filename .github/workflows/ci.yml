name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v1
    with:
      otp-version: '28'
      enable-eunit: false
      enable-ct: true
      enable-xref: false
      enable-dialyzer: false
      enable-audit: false
