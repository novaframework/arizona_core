name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v2.0.0
    with:
      enable-dependency-submission: true
      enable-summary: true
      enable-sbom-scan: true
      enable-sbom: true
      enable-coverage: true
      enable-audit: false
      otp-version: '28'
      enable-eunit: true
      enable-ct: true
      enable-ex-doc: true
